  <path d="M2625 870 C2780 930, 1890 980, 1865 910" class="light dash"/>
  <path d="M2180 910 C2250 980, 2425 980, 2495 910" class="light dash"/>

  <rect x="1725" y="960" width="1180" height="455" class="box"/>
  <text x="2315" y="1000" text-anchor="middle" class="section">6) أهم النقاط اللي لازم تحفظيها وتشرحيها</text>

  <text x="1775" y="1050" class="small">• Program.cs: نقطة التشغيل، فيها DI + Swagger + JWT + DbContext.</text>
  <text x="1775" y="1090" class="small">• Controllers: تستقبل الطلبات وتبعتها للـ services.</text>
  <text x="1775" y="1130" class="small">• Services: فيها business logic الحقيقية.</text>
  <text x="1775" y="1170" class="small">• Repositories: مسؤولة عن الوصول للداتا.</text>
  <text x="1775" y="1210" class="small">• DTOs: تفصل شكل الـ request / response عن الجداول.</text>
  <text x="1775" y="1250" class="small">• Models: تمثّل الجداول الموجودة في SQL Server.</text>
  <text x="1775" y="1290" class="small">• Transactions: تمنع حفظ بيانات ناقصة لو خطوة من العملية فشلت.</text>
  <text x="1775" y="1330" class="small">• BCrypt: يشفر الباسورد قبل التخزين.</text>
  <text x="1775" y="1370" class="small">• JWT: يثبت هوية المستخدم بعد login ويُستخدم في endpoints المحمية.</text>
  <text x="1775" y="1410" class="small">• Swagger: يعرض كل الـ APIs ويخليكي تجربيها مباشرة.</text>

  <!-- bottom speakable summary -->
  <rect x="70" y="1540" width="3060" height="370" class="soft"/>
  <text x="1600" y="1590" text-anchor="middle" class="section">7) جملة شرح شفهي جاهزة</text>
  <text x="1600" y="1650" text-anchor="middle" class="head">أنا قسمت المشروع لطبقات واضحة: Controller, Service, Repository, DTO, Model, و DbContext.</text>
  <text x="1600" y="1710" text-anchor="middle" class="head">الـ Controller يستقبل الطلب، الـ Service ينفذ المنطق، والـ Repository يتعامل مع البيانات، و DbContext يربط كل شيء بقاعدة SQL Server.</text>
  <text x="1600" y="1770" text-anchor="middle" class="head">استخدمت JWT للأمان، BCrypt لتشفير كلمة السر، وTransactions عشان العملية تكون كاملة وآمنة.</text>
  <text x="1600" y="1830" text-anchor="middle" class="small">لو سألتني البشمهندسة عن أي خطوة، أقدر أمشي معاها من أول request لحد response وأشرح كل جزء في السلسلة دي.</text>

  <!-- footer note -->
  <text x="1600" y="1990" text-anchor="middle" class="subtitle">الرسم ده معمول كمرجع بصري شامل، وتقدري تفتحيه وتشرحي منه المشروع كله بدون ما تستني أسئلة المناقشة</text>
</svg>
